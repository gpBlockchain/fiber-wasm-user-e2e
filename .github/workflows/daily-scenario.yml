name: Daily Fiber WASM scenario

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scenario:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser scenario and write report
        id: run_scenario
        run: npm run ci:scenario
        env:
          CI_SCENARIO: testnet-single
          CI_CKB_SECRET_KEY: ${{ secrets.CI_CKB_SECRET_KEY }}

      - name: Commit report
        id: commit_report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/reports
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Add daily Fiber WASM scenario report"
          git push

  notify-discord:
    runs-on: ubuntu-22.04
    needs: run-scenario
    if: always()
    steps:
      - name: Notify Discord on success
        if: needs.run-scenario.result == 'success'
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Daily Fiber WASM Scenario Succeeded"
          description: "Successfully ran the daily Fiber WASM scenario and updated reports on ${{ github.ref_name }}. Triggered by ${{ github.actor }}."
          color: 0x00ff00

      - name: Notify Discord on failure
        if: needs.run-scenario.result != 'success'
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "Daily Fiber WASM Scenario Failed"
          description: "Daily Fiber WASM scenario failed or report update did not complete. Check run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}."
          color: 0xff0000
