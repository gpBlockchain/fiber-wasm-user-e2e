name: Daily Fiber WASM scenario

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scenario:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser scenario and write report
        id: run_scenario
        run: npm run ci:scenario
        env:
          CI_SCENARIO: testnet-single
          CI_CKB_SECRET_KEY: ${{ secrets.CI_CKB_SECRET_KEY }}

      - name: Commit report
        id: commit_report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/reports
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "Add daily Fiber WASM scenario report"
          git push

      - name: Notify Discord
        if: ${{ always() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_SCENARIO_OUTCOME: ${{ steps.run_scenario.outcome }}
          COMMIT_REPORT_OUTCOME: ${{ steps.commit_report.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping Discord notification."
            exit 0
          fi

          REPORT_FILE="$(git ls-files --others --modified --exclude-standard public/reports/*.json | grep -v 'public/reports/index.json' | head -n 1 || true)"
          if [ -z "$REPORT_FILE" ]; then
            REPORT_FILE="$(git log -1 --name-only --pretty='' -- public/reports | grep '^public/reports/.*\.json$' | grep -v 'public/reports/index.json' | head -n 1 || true)"
          fi
          export REPORT_FILE

          node <<'NODE' > /tmp/discord-payload.json
          const fs = require("fs");

          const scenarioOutcome = process.env.RUN_SCENARIO_OUTCOME || "skipped";
          const commitOutcome = process.env.COMMIT_REPORT_OUTCOME || "skipped";
          const reportFile = process.env.REPORT_FILE || "";
          const report = reportFile && fs.existsSync(reportFile)
            ? JSON.parse(fs.readFileSync(reportFile, "utf8"))
            : undefined;
          const reportStatus = report?.summary?.status || scenarioOutcome;
          const reportDurationMs = report?.summary?.durationMs;
          const ok = reportStatus === "success" && (commitOutcome === "success" || commitOutcome === "skipped");
          const color = ok ? 0x1f6d55 : 0xb33a2d;
          const status = ok ? "Daily Fiber WASM scenario succeeded" : "Daily Fiber WASM scenario needs attention";
          const reportFileLabel = reportFile || "No report file detected";
          const duration = reportDurationMs === undefined
            ? "unknown"
            : `${Math.round(reportDurationMs / 1000)}s`;

          const payload = {
            username: "Fiber WASM CI",
            embeds: [
              {
                title: status,
                url: process.env.RUN_URL,
                color,
                fields: [
                  { name: "Repository", value: process.env.REPOSITORY, inline: true },
                  { name: "Branch", value: process.env.BRANCH, inline: true },
                  { name: "Scenario", value: reportStatus, inline: true },
                  { name: "Duration", value: duration, inline: true },
                  { name: "Commit report", value: commitOutcome, inline: true },
                  { name: "Report", value: reportFileLabel, inline: false },
                  { name: "Run", value: process.env.RUN_URL, inline: false }
                ],
                timestamp: new Date().toISOString()
              }
            ]
          };

          fs.writeFileSync("/tmp/discord-payload.json", JSON.stringify(payload));
          NODE

          curl -fsS \
            -H "Content-Type: application/json" \
            -d @/tmp/discord-payload.json \
            "$DISCORD_WEBHOOK_URL"
