<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiber WASM Testnet Demo</title>
    <script>
      (() => {
        const secureContext =
          location.protocol === "https:" ||
          location.hostname === "localhost" ||
          location.hostname === "127.0.0.1";

        if (window.crossOriginIsolated || !secureContext || !("serviceWorker" in navigator)) {
          return;
        }

        const swUrl = new URL("coi-serviceworker.js", document.baseURI);
        const scope = new URL("./", document.baseURI).pathname;
        const reloadKey = "fiber-wasm-coi-serviceworker-reloaded";

        navigator.serviceWorker
          .register(swUrl, { scope })
          .then(() => navigator.serviceWorker.ready)
          .then(() => {
            if (!window.crossOriginIsolated && sessionStorage.getItem(reloadKey) !== "true") {
              sessionStorage.setItem(reloadKey, "true");
              location.reload();
            }
          })
          .catch((error) => {
            console.error("Failed to register COI service worker", error);
          });
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
